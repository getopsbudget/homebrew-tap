name: Update Homebrew Formula

on:
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula version and checksums
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          if [ -z "$VERSION" ]; then
            echo "No version provided"
            exit 1
          fi

          FORMULA="Formula/opsbudget.rb"
          BASE_URL="https://github.com/getopsbudget/opsbudget-cli/releases/download/v${VERSION}"

          # Compute sha256 for each platform
          declare -A SHAS
          for PLATFORM in darwin_arm64 darwin_amd64 linux_arm64 linux_amd64; do
            URL="${BASE_URL}/opsbudget_${PLATFORM}.tar.gz"
            echo "Downloading ${URL}..."
            SHA=$(curl -sfL "$URL" | shasum -a 256 | cut -d' ' -f1)
            if [ -z "$SHA" ]; then
              echo "ERROR: Failed to download ${PLATFORM} archive"
              exit 1
            fi
            SHAS[$PLATFORM]="$SHA"
            echo "${PLATFORM}: ${SHA}"
          done

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update URLs to use versioned path
          sed -i "s|releases/latest/download/opsbudget_|releases/download/v${VERSION}/opsbudget_|g" "$FORMULA"
          sed -i "s|releases/download/v[0-9.]\+/opsbudget_|releases/download/v${VERSION}/opsbudget_|g" "$FORMULA"

          # Update sha256 for each platform by matching the url line above each sha256
          for PLATFORM in darwin_arm64 darwin_amd64 linux_arm64 linux_amd64; do
            # Use awk to find the url line for this platform and update the next sha256 line
            awk -v platform="opsbudget_${PLATFORM}.tar.gz" -v sha="${SHAS[$PLATFORM]}" '
              /url.*opsbudget_/ && $0 ~ platform { found=1 }
              found && /sha256/ {
                sub(/sha256 ".*"/, "sha256 \"" sha "\"")
                found=0
              }
              { print }
            ' "$FORMULA" > "${FORMULA}.tmp" && mv "${FORMULA}.tmp" "$FORMULA"
          done

          # Remove TODO comments from sha256 lines
          sed -i 's/ # TODO: Update sha256.*//' "$FORMULA"

          echo "Formula updated to v${VERSION}"
          cat "$FORMULA"

      - name: Commit and push
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/opsbudget.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update opsbudget to v${VERSION}"
          git push
